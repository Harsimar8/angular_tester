<div class="control-panel">

  <h3>Control Panel (Live Monitor)</h3>

  <!-- LIVE VALUES -->
  <div style="background:#d1ecf1; padding:10px;">
    <b>LIVE VALUES</b>

    <pre>{{ values | json }}</pre>

    <div *ngIf="!values || Object.keys(values).length === 0">
      No live values yet
    </div>
  </div>

  <!-- CONTROLS -->
  <div *ngFor="let c of controls"
       style="padding:10px; border:1px solid black; margin:5px">

    <b>{{ c.tag }}</b>

    <div>Type: {{ c.type }}</div>
    <div>Min: {{ c.min }}</div>
    <div>Max: {{ c.max }}</div>
    <div>Step: {{ c.step }}</div>
    <div>Default: {{ c.default }}</div>

    <div style="color:green;font-weight:bold;">
      Live Value: {{ values[c.tag] ?? c.default }}
    </div>

  </div>

</div>
