<div style="display: flex; height: 100%;">

  <!-- FILE LIST -->
  <div style="width: 35%; border-right: 1px solid #ddd; padding: 10px; overflow: auto;">
    
    <div *ngFor="let file of htmlFiles"
         (click)="openFile(file)"
         style="cursor: pointer; padding: 8px; border-bottom: 1px solid #eee;">
      {{ file.name }}
    </div>

  </div>

  <!-- PREVIEW -->
  <div style="width: 65%; padding: 10px; overflow: hidden;">

    <iframe
      [srcdoc]="selectedHtml"
      style="width: 100%; height: 100%; border: none;">
    </iframe>

  </div>

</div>
