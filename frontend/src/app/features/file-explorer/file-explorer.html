<div style="display: flex; height: 100vh;">

  <!-- LEFT: file list -->
  <div style="width: 30%; border-right: 1px solid #ddd; padding: 10px;">
    
    <div *ngFor="let file of htmlFiles"
         (click)="openFile(file)"
         style="cursor: pointer; padding: 8px; border-bottom: 1px solid #eee;">
      {{ file.name }}
    </div>

  </div>

  <!-- RIGHT: HTML preview -->
  <div style="width: 70%; padding: 10px;">

    <iframe
      [srcdoc]="selectedHtml"
      style="width: 100%; height: 100%; border: none;">
    </iframe>

  </div>

</div>
