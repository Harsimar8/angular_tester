<div class="file-explorer">
  <div class="file-list-section">
    <h4>HTML Files</h4>
    <div class="file-list">
      <div *ngFor="let file of htmlFiles"
           (click)="openFile(file)"
           [class.active]="selectedFile === file"
           class="file-item">
        {{ file.name }}
      </div>
      <div *ngIf="htmlFiles.length === 0" class="no-files">
        No HTML files uploaded yet
      </div>
    </div>
  </div>
</div>
