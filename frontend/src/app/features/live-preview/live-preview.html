<div class="live-preview">
  <div class="preview-container" *ngIf="htmlContent">
    <iframe
      #previewFrame
      [srcdoc]="htmlContent"
      class="preview-iframe"
      sandbox="allow-scripts">
    </iframe>
  </div>
  <div *ngIf="!htmlContent" class="no-preview">
    Upload an HTML file to see the preview
  </div>
</div>
